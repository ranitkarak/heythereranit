<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>GeoSmart • Country & Finance Insights</title>
  <link rel="stylesheet" href="hey.css">
</head>

<body>

  <!-- NAVBAR -->
  <nav class="navbar">
    <div class="logo">GeoSmart</div>
    <ul class="nav-links">
      <li>Home</li>
      <li>Explore</li>
      <li>Converter</li>
    </ul>
  </nav>

  <!-- HERO SECTION -->
  <section class="hero">
    <h1>Explore Countries & Currency Intelligence</h1>
    <p>Real-time country insights and smart currency conversion in one place.</p>
  </section>

  <!-- MAIN CONTENT -->
  <div id="loader" class="global-loader hidden"></div>

  <main class="main-container">

    <!-- COUNTRY INFO -->
    <section class="glass-card">
      <h2>Country Insights</h2>

      <div class="search-box">
        <input type="text" id="countryInput" placeholder="Enter country name">
        <button id="btn">Search</button>
      </div>

      <div class="country-result">
        <div class="skeleton hidden" id="country-skeleton"></div>
        <h3 id="title"></h3>
        <img id="flag" />
        <p id="desc"></p>
      </div>
    </section>

    <!-- QUICK LOOKUP -->
    <section class="glass-card">
      <h2>Quick Lookup</h2>

      <div class="search-box">
        <input type="text" class="country-input" placeholder="Search country">
        <button class="search-btn">Search</button>
      </div>

      <div class="result-container">
        <div class="skeleton hidden" id="quick-skeleton"></div>
      </div>
    </section>

    <!-- CONVERTER -->
    <section class="glass-card">
      <h2>Currency Converter</h2>

      <input type="number" class="amount-input" placeholder="Enter amount">

      <div class="dropdown">
        <div class="select-group">
          <img src="https://flagsapi.com/US/flat/32.png" />
          <select class="currency-select" name="from"></select>
        </div>

        <div class="swap-icon">⇄</div>

        <div class="select-group">
          <img src="https://flagsapi.com/US/flat/32.png" />
          <select class="currency-select" name="to"></select>
        </div>
      </div>

      <button class="convert-btn">Convert</button>

      <div class="result-box">
        <h3 class="result-value">0.00</h3>
      </div>

      <button id="colorBtn">Theme</button>
    </section>

  </main>

  <!-- FOOTER -->
  <footer class="footer">
    <p>© 2026 GeoSmart • Built for real-world insights</p>
  </footer>

  <script src="app.js"></script>

</body>
</html>
