<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  
</head>
<body>
    <h1 id="country-heading">Know About Countries!</h1>
     <title>Know about your country </title>

    <div>
        <div>
    <input type="text" id="countryInput" placeholder="facts about contries">
    <button id="btn">Get Info</button>
</div>

<div>
    <h2 id="title"></h2>
    <img id="flag" />
    <p id="desc"></p>
</div>
       <div class="country-search">

  <!-- Input + Button -->
  <div class="search-box">
    <input 
      type="text" 
      class="country-input" 
      placeholder="Enter country name"
    >
    <button class="search-btn">Search</button>
  </div>

  <!-- Result Display -->
  <div class="result-container">
    <!-- JS will insert data here -->
  </div>

</div>

<div class="result-container"></div>

    </div>
    <div id="countries-container"></div>

  <div class="converter-container">
     <div class="converter-box">

      <div class="input-group">
        <label class="input-label">Amount</label>
        <input type="number" class="input-field amount-input" placeholder="Enter amount">
      </div>

      <div class="dropdown">

        <div class="select-group">
             <img src = "https://flagsapi.com/US/flat/32.png" />
            
          <label class="input-label">From</label>
          <select  class = "currency-select" name="from">
          </select>
        </div>

        <div class="swap-icon">
          ⇄
        </div>

        <div class="select-group">
             <img src = "https://flagsapi.com/US/flat/32.png" />
          <label class="input-label">To</label>
          <select  class = "currency-select" name="to">
          </select>                                                      
        </div>

      </div>

      <!-- Button -->
      <button class="convert-btn">Convert</button>

      <!-- Result -->
      <div class="result-box">
        <p class="result-text">Converted Amount:</p>
        <h2 class="result-value">0.00</h2>
      </div>
      <button id="colorBtn">Theme</button>

    </div>

  </div>
<script src="first1.js"></script>
<script src="firstt.js"></script>
 <link rel="stylesheet" href="hey.css"></link>
</body>
</html>
